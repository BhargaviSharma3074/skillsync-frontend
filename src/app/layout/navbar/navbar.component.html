<header class="navbar">
  <div class="navbar-spacer"></div>

  <div class="navbar-actions">
    <button mat-icon-button (click)="themeService.toggleTheme()" [matTooltip]="themeService.isDarkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode'">
      <mat-icon>{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <button mat-icon-button matBadge="3" matBadgeColor="accent" matBadgeSize="small" routerLink="/notifications">
      <mat-icon>notifications_none</mat-icon>
    </button>

    <button class="avatar-btn" [matMenuTriggerFor]="userMenu">
      <span class="avatar sm" [style.background]="bgColor">{{ initials }}</span>
    </button>

    <mat-menu #userMenu="matMenu" [overlapTrigger]="false" class="profile-menu">
      <div class="menu-header">
        <span class="avatar md" [style.background]="bgColor">{{ initials }}</span>
        <div class="menu-user-info">
          <strong>{{ auth.currentUser()?.firstName }} {{ auth.currentUser()?.lastName }}</strong>
          <span>{{ auth.currentUser()?.email }}</span>
        </div>
      </div>
      <mat-divider />
      <button mat-menu-item routerLink="/profile">
        <mat-icon>person</mat-icon>
        <span>My Profile</span>
      </button>
      <button mat-menu-item routerLink="/settings">
        <mat-icon>settings</mat-icon>
        <span>Settings</span>
      </button>
      <mat-divider />
      <button mat-menu-item (click)="logout()" class="logout-item">
        <mat-icon>logout</mat-icon>
        <span>Sign Out</span>
      </button>
    </mat-menu>
  </div>
</header>
