<div class="profile-preview-container">
  <mat-card class="profile-card">
    <mat-card-header>
      <div class="profile-avatar" [style.background]="bgColor">
        {{ initials }}
      </div>
    </mat-card-header>

    <mat-card-content class="profile-details">
      <div class="detail-item">
        <label>User ID</label>
        <p>{{ user()?.id }}</p>
      </div>

      <div class="detail-item">
        <label>Full Name</label>
        <p>{{ fullName }}</p>
      </div>

      <div class="detail-item">
        <label>Email</label>
        <p>{{ user()?.email }}</p>
      </div>

      <div class="detail-item">
        <label>Role</label>
        <p class="role-badge">{{ roleDisplay }}</p>
      </div>
    </mat-card-content>

    <mat-card-actions class="profile-actions">
      <button mat-flat-button color="warn" routerLink="/profile/edit">
        <mat-icon>edit</mat-icon>
        Update Profile
      </button>
    </mat-card-actions>
  </mat-card>
</div>
